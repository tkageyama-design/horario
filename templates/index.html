<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Controle de Jornada</title>

<link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon.png') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

<div class="relogio" id="relogio"></div>

<h2>Controle de Jornada</h2>

<label>Entrada</label>
<input type="time" id="entrada">

<label>Saída para almoço</label>
<input type="time" id="saidaAlmoco">

<label>Retorno do almoço</label>
<input type="time" id="retornoAlmoco">

<label>Saída prevista</label>
<input type="time" id="saidaPrevista" readonly>

<label>Saída real</label>
<input type="time" id="saidaReal">

<button onclick="calcular()">Calcular</button>
<button onclick="limparCampos()" class="limpar">Limpar</button>

<div class="resultado">

<p>Horas trabalhadas: <span id="horasTrabalhadas">--:--</span></p>

<p>Horas extras: <span id="horasExtras">--:--</span></p>

</div>

<div class="progress-container">
<div id="progressBar"></div>
</div>

<p id="percentual">0%</p>

</div>

<script>

function paraMinutos(hora){

let partes = hora.split(":")
return parseInt(partes[0])*60 + parseInt(partes[1])

}

function paraHora(min){

let h = Math.floor(min/60)
let m = min%60

return String(h).padStart(2,'0') + ":" + String(m).padStart(2,'0')

}

function calcular(){

let entrada = document.getElementById("entrada").value
let saidaAlmoco = document.getElementById("saidaAlmoco").value
let retornoAlmoco = document.getElementById("retornoAlmoco").value
let saidaReal = document.getElementById("saidaReal").value

if(!entrada || !saidaAlmoco || !retornoAlmoco) return

let mEntrada = paraMinutos(entrada)
let mSaidaAlmoco = paraMinutos(saidaAlmoco)
let mRetornoAlmoco = paraMinutos(retornoAlmoco)

let almoco = mRetornoAlmoco - mSaidaAlmoco

if(almoco < 60){

let campo = document.getElementById("retornoAlmoco")

campo.classList.add("alerta")

setTimeout(()=>campo.classList.remove("alerta"),1200)

}else{

document.getElementById("retornoAlmoco").classList.remove("alerta")

}

let saidaPrevistaMin = mEntrada + 480 + almoco

document.getElementById("saidaPrevista").value = paraHora(saidaPrevistaMin)

let trabalhado = (mSaidaAlmoco - mEntrada) + (mRetornoAlmoco - mSaidaAlmoco)

document.getElementById("horasTrabalhadas").innerText = paraHora(trabalhado)

if(saidaReal){

let mSaidaReal = paraMinutos(saidaReal)

let extra = mSaidaReal - saidaPrevistaMin

if(extra > 0){

document.getElementById("horasExtras").innerText = paraHora(extra)

}else{

document.getElementById("horasExtras").innerText = "00:00"

}

}

}

function atualizarProgresso(){

let entrada = document.getElementById("entrada").value
let saidaPrevista = document.getElementById("saidaPrevista").value

if(!entrada || !saidaPrevista) return

let agora = new Date()

let agoraMin = agora.getHours()*60 + agora.getMinutes()

let inicio = paraMinutos(entrada)
let fim = paraMinutos(saidaPrevista)

let progresso = ((agoraMin - inicio)/(fim - inicio))*100

if(progresso < 0) progresso = 0
if(progresso > 100) progresso = 100

let barra = document.getElementById("progressBar")

barra.style.width = progresso + "%"

if(progresso >= 100){

barra.style.background = "#2ecc71"

}

document.getElementById("percentual").innerText = Math.floor(progresso) + "%"

}

setInterval(atualizarProgresso,60000)

function limparCampos(){

document.getElementById("entrada").value=""
document.getElementById("saidaAlmoco").value=""
document.getElementById("retornoAlmoco").value=""
document.getElementById("saidaPrevista").value=""
document.getElementById("saidaReal").value=""

document.getElementById("horasTrabalhadas").innerText="--:--"
document.getElementById("horasExtras").innerText="--:--"

document.getElementById("progressBar").style.width="0%"

document.getElementById("percentual").innerText="0%"

}

function atualizarRelogio(){

let agora = new Date()

let h = String(agora.getHours()).padStart(2,'0')
let m = String(agora.getMinutes()).padStart(2,'0')
let s = String(agora.getSeconds()).padStart(2,'0')

document.getElementById("relogio").innerText = h + ":" + m + ":" + s

}

setInterval(atualizarRelogio,1000)

</script>

</body>
</html>
